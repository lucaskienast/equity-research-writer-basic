<!DOCTYPE html>
<html lang="en" class="">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Equity Research Writer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <style>
    /* Base */
    body { background-color: #f9fafb; }
    html.dark body { background-color: #030712; }

    /* Prose — light */
    .prose h1, .prose h2, .prose h3 { color: #111827; margin-top: 1em; margin-bottom: 0.4em; font-weight: 600; }
    .prose h1 { font-size: 1.25rem; }
    .prose h2 { font-size: 1.1rem; }
    .prose h3 { font-size: 1rem; }
    .prose p, .prose ul, .prose ol, .prose li { color: #374151; line-height: 1.65; }
    .prose ul { padding-left: 1.4em; list-style-type: disc; }
    .prose ol { padding-left: 1.4em; list-style-type: decimal; }
    .prose li { margin-bottom: 0.25em; }
    .prose strong { color: #111827; }
    .prose code { background: #f3f4f6; color: #065f46; padding: 0.1em 0.35em; border-radius: 4px; font-size: 0.875em; }
    .prose pre { background: #f3f4f6; padding: 0.75em 1em; border-radius: 6px; overflow-x: auto; }
    .prose pre code { background: transparent; padding: 0; }

    /* Prose — dark */
    html.dark .prose h1, html.dark .prose h2, html.dark .prose h3 { color: #e5e7eb; }
    html.dark .prose p, html.dark .prose ul, html.dark .prose ol, html.dark .prose li { color: #d1d5db; }
    html.dark .prose strong { color: #f3f4f6; }
    html.dark .prose code { background: #1f2937; color: #86efac; }
    html.dark .prose pre { background: #1f2937; }

    /* Bubble: user message */
    .msg-user { background: #e0e7ff; color: #1e1b4b; }
    html.dark .msg-user { background: #1e293b; color: #e2e8f0; }

    /* Bubble: analyst */
    .msg-analyst { background: rgba(255,255,255,0.6); border-color: #d1d5db; }
    .msg-analyst .bubble-label { color: #b45309; }
    html.dark .msg-analyst { background: rgba(17,24,39,0.6); border-color: #374151; }
    html.dark .msg-analyst .bubble-label { color: #fbbf24; }

    /* Bubble: morning note */
    .msg-morning { background: rgba(255,255,255,0.6); border-color: #d1d5db; }
    .msg-morning .bubble-label { color: #059669; }
    html.dark .msg-morning { background: rgba(17,24,39,0.6); border-color: #374151; }
    html.dark .msg-morning .bubble-label { color: #34d399; }

    /* Bubble: error */
    .msg-error { background: rgba(127,29,29,0.08); border-color: rgba(127,29,29,0.25); color: #b91c1c; }
    html.dark .msg-error { background: rgba(127,29,29,0.4); border-color: rgba(153,27,27,0.5); color: #fca5a5; }

    /* Bubble: file attachment */
    .msg-file { background: #f1f5f9; border-color: #cbd5e1; color: #475569; }
    html.dark .msg-file { background: #1e293b; border-color: #334155; color: #94a3b8; }
    .msg-file .file-icon { color: #94a3b8; }
    html.dark .msg-file .file-icon { color: #64748b; }

    /* Bubble: thinking */
    .msg-thinking { background: #f9fafb; border-color: #e5e7eb; }
    html.dark .msg-thinking { background: #111827; border-color: #1f2937; }
    .msg-thinking .thinking-label { color: #9ca3af; }
    html.dark .msg-thinking .thinking-label { color: #6b7280; }

    /* Analyst / Morning Note highlight boxes (rendered inside prose) */
    .analyst-box { background-color: #fffde7; padding: 16px; border-radius: 8px; border: 1px solid #fff176; margin: 16px 0; }
    html.dark .analyst-box { background: rgba(251, 191, 36, 0.12); border-color: #92400e; }

    .morning-box { background-color: #e8f5e9; padding: 16px; border-radius: 8px; border: 1px solid #a5d6a7; margin: 16px 0; }
    html.dark .morning-box { background: rgba(52, 211, 153, 0.1); border-color: #065f46; }

    /* Bubble: rating */
    .msg-rating { background: rgba(255,255,255,0.6); border-color: #d1d5db; }
    .msg-rating .bubble-label { color: #b45309; }
    html.dark .msg-rating { background: rgba(17,24,39,0.6); border-color: #374151; }
    html.dark .msg-rating .bubble-label { color: #fbbf24; }

    /* Stars */
    .star-btn { font-size: 1.5rem; cursor: pointer; color: #d1d5db; transition: color 0.1s; line-height: 1; background: none; border: none; padding: 0 2px; }
    html.dark .star-btn { color: #4b5563; }
    .star-btn.lit { color: #f59e0b; }
    html.dark .star-btn.lit { color: #f59e0b; }

    /* Bubble: approval */
    .msg-approval { background: rgba(255,255,255,0.6); border-color: #d1d5db; }
    .msg-approval .bubble-label { color: #4f46e5; }
    html.dark .msg-approval { background: rgba(17,24,39,0.6); border-color: #374151; }
    html.dark .msg-approval .bubble-label { color: #818cf8; }

    /* Bubble: cancelled */
    .msg-cancelled { background: #f3f4f6; border-color: #d1d5db; color: #6b7280; }
    html.dark .msg-cancelled { background: #1f2937; border-color: #374151; color: #9ca3af; }

    /* Approval action buttons */
    .btn-approve { background: #10b981; color: #fff; }
    .btn-approve:hover:not(:disabled) { background: #059669; }
    .btn-decline { background: #6b7280; color: #fff; }
    .btn-decline:hover:not(:disabled) { background: #4b5563; }
    .btn-approve, .btn-decline { border: none; border-radius: 0.5rem; padding: 0.375rem 1rem; font-size: 0.875rem; font-weight: 500; cursor: pointer; transition: background 0.15s; }
    .btn-approve:disabled, .btn-decline:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Three-dot bounce */
    @keyframes bounce-dot {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-6px); opacity: 1; }
    }
    .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: #9ca3af; animation: bounce-dot 1.2s infinite; }
    html.dark .dot { background: #6b7280; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    /* Sidebar */
    #sidebar {
      width: 220px;
      min-width: 220px;
      background: #f3f4f6;
      border-right: 1px solid #e5e7eb;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    html.dark #sidebar {
      background: #111827;
      border-right-color: #1f2937;
    }
    #historyList li button {
      width: 100%;
      text-align: left;
      padding: 0.5rem 0.75rem;
      font-size: 0.78rem;
      line-height: 1.35;
      color: #374151;
      background: none;
      border: none;
      cursor: pointer;
      border-radius: 0.375rem;
      transition: background 0.12s;
      word-break: break-word;
    }
    html.dark #historyList li button { color: #d1d5db; }
    #historyList li button:hover { background: #e5e7eb; }
    html.dark #historyList li button:hover { background: #1f2937; }
    #historyList li button.active { background: #fef3c7; color: #92400e; font-weight: 600; }
    html.dark #historyList li button.active { background: #1c1a0f; color: #fbbf24; }
  </style>
</head>
<body class="h-screen flex flex-col text-gray-900 dark:text-gray-100 overflow-hidden">

  <!-- Header -->
  <header class="border-b border-gray-200 dark:border-gray-800 bg-gray-50/70 dark:bg-gray-900/70 backdrop-blur sticky top-0 z-10">
    <div class="px-4 py-3 flex items-center justify-between gap-2">
      <span class="text-lg font-semibold tracking-tight">Equity Research Writer</span>
      <button id="themeToggle" title="Toggle theme"
        class="text-gray-500 hover:text-gray-800 dark:text-gray-400 dark:hover:text-gray-200 transition-colors p-1 rounded-md">
      </button>
    </div>
  </header>

  <!-- Body: sidebar + main -->
  <div class="flex flex-1 overflow-hidden">

    <!-- Sidebar -->
    <aside id="sidebar">
      <div class="px-3 pt-3 pb-1 text-xs font-semibold uppercase tracking-wider text-gray-500 dark:text-gray-400">History</div>
      <div class="px-2 pb-2">
        <button id="newAnalysisBtn"
          class="w-full text-left px-3 py-1.5 text-xs font-medium rounded-lg border border-gray-300 dark:border-gray-700 text-gray-600 dark:text-gray-300 bg-white dark:bg-gray-800 hover:border-amber-400 hover:text-amber-600 dark:hover:text-amber-400 transition-colors">
          + New analysis
        </button>
      </div>
      <ul id="historyList" class="flex-1 px-1 pb-4 flex flex-col gap-0.5"></ul>
    </aside>

    <!-- Main column -->
    <div class="flex-1 flex flex-col overflow-hidden">

  <!-- Chat area -->
  <main class="flex-1 overflow-y-auto pb-56">
    <div id="chat" class="max-w-4xl mx-auto px-4 py-6 flex flex-col gap-4"></div>
  </main>

  <!-- Sticky input panel -->
  <div id="inputPanel" class="fixed bottom-0 left-[220px] right-0 bg-gray-50/95 dark:bg-gray-900/95 backdrop-blur border-t border-gray-200 dark:border-gray-800">
    <div class="max-w-4xl mx-auto px-4 py-3">

      <!-- Collapsible metadata row -->
      <details class="mb-2 group" open>
        <summary class="cursor-pointer text-xs text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 select-none list-none flex items-center gap-1">
          <svg id="chevron" class="w-3 h-3 transition-transform group-open:rotate-180" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
          Optional: Company / Ticker / Analyst
        </summary>
        <div class="mt-2 grid grid-cols-3 gap-2">
          <input id="company" type="text" placeholder="Company name"
            class="bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg px-3 py-1.5 text-sm text-gray-800 dark:text-gray-100 placeholder-gray-400 dark:placeholder-gray-500 focus:outline-none focus:ring-1 focus:ring-amber-500" />
          <input id="ticker" type="text" placeholder="Ticker (e.g. OCDO)"
            class="bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg px-3 py-1.5 text-sm text-gray-800 dark:text-gray-100 placeholder-gray-400 dark:placeholder-gray-500 focus:outline-none focus:ring-1 focus:ring-amber-500" />
          <input id="analyst" type="text" placeholder="Analyst name"
            class="bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg px-3 py-1.5 text-sm text-gray-800 dark:text-gray-100 placeholder-gray-400 dark:placeholder-gray-500 focus:outline-none focus:ring-1 focus:ring-amber-500" />
        </div>
      </details>

      <!-- Main input row -->
      <div class="flex items-end gap-2">
        <!-- File attach -->
        <label class="flex-none cursor-pointer text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 transition-colors" title="Attach PDF or TXT">
          <svg class="w-5 h-5 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/>
          </svg>
          <input id="fileInput" type="file" accept=".pdf,.txt" class="hidden" />
        </label>

        <!-- Textarea -->
        <div class="flex-1 relative">
          <textarea id="textInput" rows="2"
            placeholder="Paste RNS, trading update, or context… (Cmd/Ctrl+Enter to send)"
            class="w-full bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-xl px-4 py-3 pr-12 text-sm text-gray-900 dark:text-gray-100 placeholder-gray-400 dark:placeholder-gray-500 resize-none focus:outline-none focus:ring-1 focus:ring-amber-500 leading-relaxed"></textarea>
          <!-- Send button -->
          <button id="sendBtn"
            class="absolute right-2 bottom-2 bg-amber-500 hover:bg-amber-400 disabled:bg-gray-200 dark:disabled:bg-gray-700 disabled:cursor-not-allowed text-black rounded-lg p-1.5 transition-colors"
            title="Send">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- File badge -->
      <div id="fileBadge" class="hidden mt-2 inline-flex items-center gap-1.5 bg-gray-100 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-full px-3 py-1 text-xs text-gray-600 dark:text-gray-300">
        <span id="fileName"></span>
        <button id="removeFile" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-200">✕</button>
      </div>

    </div>
  </div>

    </div><!-- /main column -->
  </div><!-- /flex body -->

  <script>
    const chat = document.getElementById('chat');
    const historyList = document.getElementById('historyList');
    const textInput = document.getElementById('textInput');
    const sendBtn = document.getElementById('sendBtn');
    const fileInput = document.getElementById('fileInput');
    const fileBadge = document.getElementById('fileBadge');
    const fileNameEl = document.getElementById('fileName');
    const removeFileBtn = document.getElementById('removeFile');
    const companyEl = document.getElementById('company');
    const tickerEl = document.getElementById('ticker');
    const analystEl = document.getElementById('analyst');

    const themeToggle = document.getElementById('themeToggle');
    const htmlEl = document.documentElement;
    const inputPanel = document.getElementById('inputPanel');
    const mainEl = document.querySelector('main');

    function hideInputPanel() {
      inputPanel.classList.add('hidden');
      mainEl.classList.remove('pb-56');
      mainEl.classList.add('pb-6');
    }

    function showInputPanel() {
      inputPanel.classList.remove('hidden');
      mainEl.classList.remove('pb-6');
      mainEl.classList.add('pb-56');
    }

    function applyTheme(dark) {
      htmlEl.classList.toggle('dark', dark);
      themeToggle.innerHTML = dark
        ? `<svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m8.66-9h-1M4.34 12h-1m15.07-6.07-.71.71M6.34 17.66l-.71.71m12.73 0-.71-.71M6.34 6.34l-.71-.71M12 8a4 4 0 100 8 4 4 0 000-8z"/></svg>`
        : `<svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"/></svg>`;
    }

    // Default light; restore saved preference
    const savedTheme = localStorage.getItem('theme');
    applyTheme(savedTheme === 'dark');

    themeToggle.addEventListener('click', () => {
      const isDark = !htmlEl.classList.contains('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      applyTheme(isDark);
    });

    let selectedFile = null;
    let polling = null;
    let phase2ThinkingShown = false;
    let activeRunId = null;

    // ── Sidebar history ──────────────────────────────────────────────────────
    async function loadHistory() {
      try {
        const res = await fetch('/api/history');
        if (!res.ok) return;
        const runs = await res.json();
        historyList.innerHTML = '';
        if (!runs.length) {
          const li = document.createElement('li');
          li.innerHTML = '<span class="px-3 py-2 text-xs text-gray-400 dark:text-gray-600 block">No previous runs</span>';
          historyList.appendChild(li);
          return;
        }
        runs.forEach(run => {
          const li = document.createElement('li');
          const btn = document.createElement('button');
          btn.dataset.runId = run.run_id;
          const label = run.company
            ? `${run.company}${run.ticker ? ' (' + run.ticker + ')' : ''}\n${run.date}`
            : (run.title || run.run_id);
          btn.textContent = label;
          btn.style.whiteSpace = 'pre-line';
          if (run.run_id === activeRunId) btn.classList.add('active');
          btn.addEventListener('click', () => openHistoryRun(run.run_id));
          li.appendChild(btn);
          historyList.appendChild(li);
        });
      } catch (e) {
        // silently ignore
      }
    }

    async function openHistoryRun(runId) {
      hideInputPanel();
      activeRunId = runId;
      // highlight active item in sidebar
      historyList.querySelectorAll('button').forEach(b => b.classList.remove('active'));
      historyList.querySelectorAll('button[data-run-id="' + runId + '"]').forEach(b => b.classList.add('active'));

      chat.innerHTML = '';
      const loading = document.createElement('div');
      loading.className = 'self-start flex items-center gap-1.5 msg-thinking border rounded-2xl rounded-bl-sm px-4 py-3';
      loading.innerHTML = '<span class="thinking-label text-xs mr-1">Loading</span><span class="dot"></span><span class="dot"></span><span class="dot"></span>';
      chat.appendChild(loading);

      try {
        const res = await fetch(`/api/history/${runId}`);
        loading.remove();
        if (!res.ok) {
          appendErrorBubble('Could not load this run.');
          return;
        }
        const data = await res.json();
        if (data.analyst_markdown) appendAnalystBubble(data.analyst_markdown);
        if (data.analyst_markdown && data.morning_note_markdown) {
          appendHistoryApprovalBubble();
        }
        if (data.morning_note_markdown) appendMorningNoteBubble(data.morning_note_markdown);
        if (data.feedback && data.feedback.rating) {
          appendHistoryRatingBubble(data.feedback);
        }
      } catch (e) {
        loading.remove();
        appendErrorBubble('Network error: ' + e.message);
      }
    }

    loadHistory();

    document.getElementById('newAnalysisBtn').addEventListener('click', () => {
      activeRunId = null;
      historyList.querySelectorAll('button').forEach(b => b.classList.remove('active'));
      chat.innerHTML = '';
      showInputPanel();
      setInputsEnabled();
      textInput.focus();
    });

    // File selection
    fileInput.addEventListener('change', () => {
      selectedFile = fileInput.files[0] || null;
      if (selectedFile) {
        fileNameEl.textContent = selectedFile.name;
        fileBadge.classList.remove('hidden');
      }
    });

    removeFileBtn.addEventListener('click', () => {
      selectedFile = null;
      fileInput.value = '';
      fileBadge.classList.add('hidden');
    });

    // Cmd/Ctrl+Enter submits
    textInput.addEventListener('keydown', (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
        e.preventDefault();
        send();
      }
    });

    sendBtn.addEventListener('click', send);

    function setInputsDisabled(disabled) {
      textInput.disabled = disabled;
      sendBtn.disabled = disabled;
      fileInput.disabled = disabled;
      companyEl.disabled = disabled;
      tickerEl.disabled = disabled;
      analystEl.disabled = disabled;
      sendBtn.classList.toggle('opacity-50', disabled);
    }

    function setInputsEnabled() {
      setInputsDisabled(false);
    }

    function scrollToBottom() {
      window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function appendUserMessage(label) {
      const el = document.createElement('div');
      el.className = 'self-end max-w-xl msg-user rounded-2xl rounded-br-sm px-4 py-3 text-sm break-words';
      el.textContent = label;
      chat.appendChild(el);
      scrollToBottom();
    }

    function appendThinking(label) {
      const el = document.createElement('div');
      el.id = 'thinking';
      el.className = 'self-start flex items-center gap-1.5 msg-thinking border rounded-2xl rounded-bl-sm px-4 py-3';
      el.innerHTML = `<span class="thinking-label text-xs mr-1">${label || 'Analysing'}</span><span class="dot"></span><span class="dot"></span><span class="dot"></span>`;
      chat.appendChild(el);
      scrollToBottom();
    }

    function removeThinking() {
      const el = document.getElementById('thinking');
      if (el) el.remove();
    }

    // Alias used in new polling state machine
    const appendThinkingBubble = appendThinking;
    const removeThinkingBubble = removeThinking;

    function appendAnalystBubble(markdown) {
      const el = document.createElement('div');
      el.className = 'self-start max-w-3xl w-full msg-analyst border rounded-2xl rounded-bl-sm px-5 py-4';
      el.innerHTML = `
        <div class="bubble-label text-xs font-semibold mb-3 uppercase tracking-wide">Analyst Review</div>
        <div class="prose text-sm">${marked.parse(markdown || '')}</div>
      `;
      chat.appendChild(el);
      scrollToBottom();
    }

    function appendMorningNoteBubble(markdown) {
      const el = document.createElement('div');
      el.className = 'self-start max-w-3xl w-full msg-morning border rounded-2xl rounded-bl-sm px-5 py-4';
      el.innerHTML = `
        <div class="bubble-label text-xs font-semibold mb-3 uppercase tracking-wide">Morning Note</div>
        <div class="prose text-sm">${marked.parse(markdown || '')}</div>
      `;
      chat.appendChild(el);
      scrollToBottom();
    }

    function appendHistoryApprovalBubble() {
      const el = document.createElement('div');
      el.className = 'self-start max-w-sm w-full msg-approval border rounded-2xl rounded-bl-sm px-5 py-4';
      el.innerHTML = `
        <div class="bubble-label text-xs font-semibold mb-3 uppercase tracking-wide">Analyst Gate</div>
        <p class="text-sm mb-4">Would you like to proceed with the morning note?</p>
        <div class="flex gap-3">
          <button class="btn-approve opacity-60 cursor-default" disabled>Yes, proceed</button>
          <button class="btn-decline opacity-40 cursor-default" disabled>No, cancel</button>
        </div>
      `;
      chat.appendChild(el);
      scrollToBottom();
    }

    function appendHistoryRatingBubble(feedback) {
      const el = document.createElement('div');
      el.className = 'self-start max-w-sm w-full msg-rating border rounded-2xl rounded-bl-sm px-5 py-4';
      const filled = '★'.repeat(feedback.rating);
      const empty = '☆'.repeat(5 - feedback.rating);
      el.innerHTML = `
        <div class="bubble-label text-xs font-semibold mb-1 uppercase tracking-wide">Feedback saved</div>
        <div class="text-amber-500 text-lg leading-none mb-2">${filled}<span class="text-gray-300 dark:text-gray-600">${empty}</span></div>
        ${feedback.critique ? `<p class="text-sm text-gray-500 dark:text-gray-400 italic">${feedback.critique}</p>` : ''}
      `;
      chat.appendChild(el);
      scrollToBottom();
    }

    function appendErrorBubble(message) {
      const el = document.createElement('div');
      el.className = 'self-start max-w-xl msg-error border rounded-2xl rounded-bl-sm px-4 py-3 text-sm';
      el.textContent = message || 'An unexpected error occurred.';
      chat.appendChild(el);
      scrollToBottom();
    }

    function appendFileBubble(filename) {
      const el = document.createElement('div');
      el.className = 'self-end max-w-xl msg-file border rounded-2xl rounded-br-sm px-4 py-3 text-sm flex items-center gap-2';
      el.innerHTML = `<svg class="w-4 h-4 flex-none file-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/></svg><span>${filename}</span>`;
      chat.appendChild(el);
      scrollToBottom();
    }

    function appendApprovalPrompt(jobId) {
      const el = document.createElement('div');
      el.className = 'self-start max-w-sm w-full msg-approval border rounded-2xl rounded-bl-sm px-5 py-4';
      el.innerHTML = `
        <div class="bubble-label text-xs font-semibold mb-3 uppercase tracking-wide">Analyst Gate</div>
        <p class="text-sm mb-4">Would you like to proceed with the morning note?</p>
        <div class="flex gap-3">
          <button id="approveBtn" class="btn-approve">Yes, proceed</button>
          <button id="declineBtn" class="btn-decline">No, cancel</button>
        </div>
      `;
      chat.appendChild(el);
      scrollToBottom();

      const approveBtn = el.querySelector('#approveBtn');
      const declineBtn = el.querySelector('#declineBtn');

      async function handleDecision(approved) {
        approveBtn.disabled = true;
        declineBtn.disabled = true;
        try {
          await fetch(`/api/approve/${jobId}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ approved }),
          });
        } catch (err) {
          appendErrorBubble('Network error: ' + err.message);
          return;
        }
        if (approved) {
          appendThinkingBubble('Generating morning note…');
          phase2ThinkingShown = true;
          startPolling(jobId);
        } else {
          appendCancelledBubble();
        }
      }

      approveBtn.addEventListener('click', () => handleDecision(true));
      declineBtn.addEventListener('click', () => handleDecision(false));
    }

    function appendCancelledBubble() {
      const el = document.createElement('div');
      el.className = 'self-start max-w-xl msg-cancelled border rounded-2xl rounded-bl-sm px-4 py-3 text-sm';
      el.textContent = 'Analysis cancelled.';
      chat.appendChild(el);
      scrollToBottom();
    }

    function startPolling(jobId) {
      polling = setInterval(async () => {
        try {
          const res = await fetch(`/api/status/${jobId}`);
          const job = await res.json();
          const status = job.status;

          if (status === 'running') {
            // keep polling

          } else if (status === 'awaiting_approval') {
            clearInterval(polling);
            removeThinkingBubble();
            appendAnalystBubble(job.analyst_markdown);
            setTimeout(() => appendApprovalPrompt(jobId), 400);

          } else if (status === 'phase2_running') {
            if (!phase2ThinkingShown) {
              phase2ThinkingShown = true;
              appendThinkingBubble('Generating morning note…');
            }
            // keep polling

          } else if (status === 'done') {
            clearInterval(polling);
            removeThinkingBubble();
            appendMorningNoteBubble(job.morning_note_markdown);
            loadHistory();
            setTimeout(() => showRatingPrompt(jobId), 400);

          } else if (status === 'cancelled') {
            clearInterval(polling);
            appendCancelledBubble();

          } else if (status === 'error') {
            clearInterval(polling);
            removeThinkingBubble();
            appendErrorBubble(job.error || 'Workflow error.');
          }
        } catch (err) {
          clearInterval(polling);
          removeThinkingBubble();
          appendErrorBubble('Polling error: ' + err.message);
        }
      }, 2000);
    }

    async function send() {
      const text = textInput.value.trim();
      if (!text && !selectedFile) return;

      phase2ThinkingShown = false;

      if (selectedFile && text) {
        appendUserMessage(text.length > 120 ? text.slice(0, 120) + '…' : text);
        appendFileBubble(selectedFile.name);
      } else if (selectedFile) {
        appendFileBubble(selectedFile.name);
      } else {
        appendUserMessage(text.length > 120 ? text.slice(0, 120) + '…' : text);
      }
      setInputsDisabled(true);
      appendThinking();

      const fd = new FormData();
      fd.append('text', text);
      if (selectedFile) fd.append('file', selectedFile);
      fd.append('company', companyEl.value.trim());
      fd.append('ticker', tickerEl.value.trim());
      fd.append('analyst', analystEl.value.trim());

      let jobId;
      try {
        const res = await fetch('/api/run', { method: 'POST', body: fd });
        if (res.status === 413) {
          removeThinking();
          appendErrorBubble('File too large. Maximum size is 20 MB.');
          setInputsDisabled(false);
          return;
        }
        const data = await res.json();
        if (!res.ok) {
          removeThinking();
          appendErrorBubble(data.error || 'Submission failed.');
          setInputsDisabled(false);
          return;
        }
        jobId = data.job_id;
      } catch (err) {
        removeThinking();
        appendErrorBubble('Network error: ' + err.message);
        setInputsDisabled(false);
        return;
      }

      // Clear inputs after successful submission
      textInput.value = '';
      selectedFile = null;
      fileInput.value = '';
      fileBadge.classList.add('hidden');

      hideInputPanel();
      startPolling(jobId);
    }
    function showRatingPrompt(jobId) {
      const bubble = document.createElement('div');
      bubble.className = 'self-start max-w-sm w-full msg-rating border rounded-2xl rounded-bl-sm px-5 py-4';

      const stars = [1, 2, 3, 4, 5];
      let selectedRating = 0;

      function renderBubble() {
        bubble.innerHTML = `
          <div class="bubble-label text-xs font-semibold mb-3 uppercase tracking-wide">Rate this output</div>
          <div class="flex gap-1 mb-3" id="starRow">
            ${stars.map(n => `<button class="star-btn" data-n="${n}" aria-label="${n} star">★</button>`).join('')}
          </div>
          <textarea id="critiqueInput" rows="2" placeholder="Optional critique…"
            class="w-full bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg px-3 py-2 text-sm text-gray-900 dark:text-gray-100 placeholder-gray-400 dark:placeholder-gray-500 resize-none focus:outline-none focus:ring-1 focus:ring-amber-500 mb-3"></textarea>
          <div class="flex items-center gap-3">
            <button id="submitRating"
              class="bg-amber-500 hover:bg-amber-400 disabled:bg-gray-200 dark:disabled:bg-gray-700 disabled:cursor-not-allowed text-black text-sm font-medium rounded-lg px-4 py-1.5 transition-colors"
              disabled>Submit feedback</button>
            <button id="skipRating" class="text-xs text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 transition-colors">Skip</button>
          </div>
        `;

        const starBtns = bubble.querySelectorAll('.star-btn');
        const submitBtn = bubble.querySelector('#submitRating');
        const skipBtn = bubble.querySelector('#skipRating');

        function paintStars(hovered) {
          const threshold = hovered !== null ? hovered : selectedRating;
          starBtns.forEach(btn => {
            btn.classList.toggle('lit', parseInt(btn.dataset.n) <= threshold);
          });
        }

        starBtns.forEach(btn => {
          btn.addEventListener('mouseenter', () => paintStars(parseInt(btn.dataset.n)));
          btn.addEventListener('mouseleave', () => paintStars(null));
          btn.addEventListener('click', () => {
            selectedRating = parseInt(btn.dataset.n);
            paintStars(null);
            submitBtn.disabled = false;
          });
        });

        submitBtn.addEventListener('click', async () => {
          const critique = bubble.querySelector('#critiqueInput').value.trim();
          submitBtn.disabled = true;
          try {
            const res = await fetch(`/api/feedback/${jobId}`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ rating: selectedRating, critique }),
            });
            if (res.ok) {
              const filled = '★'.repeat(selectedRating);
              const empty = '☆'.repeat(5 - selectedRating);
              bubble.innerHTML = `
                <div class="bubble-label text-xs font-semibold mb-1 uppercase tracking-wide">Feedback saved</div>
                <div class="text-amber-500 text-lg leading-none">${filled}<span class="text-gray-300 dark:text-gray-600">${empty}</span></div>
              `;
            } else {
              submitBtn.disabled = false;
            }
          } catch {
            submitBtn.disabled = false;
          }
        });

        skipBtn.addEventListener('click', () => {
          bubble.innerHTML = `<div class="text-xs text-gray-400 dark:text-gray-500">Feedback skipped.</div>`;
        });
      }

      renderBubble();
      chat.appendChild(bubble);
      scrollToBottom();
    }
  </script>
</body>
</html>
